/* ─────────────────────────── SPLASH SCREEN ─────────────────────── */
function SplashScreen({ onEnter }) {
  const canvasRef = useRef(null);
  const [phase, setPhase] = useState(0);
  // phase 0 = hidden, 1 = logo in, 2 = tagline in, 3 = button in, 4 = exiting

  useEffect(() => {
    const t1 = setTimeout(() => setPhase(1), 300);
    const t2 = setTimeout(() => setPhase(2), 1200);
    const t3 = setTimeout(() => setPhase(3), 2000);
    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
  }, []);

  /* ── Canvas particle mesh ── */
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let raf, W, H;
    const DOTS = 90;
    const dots = [];

    function resize() {
      W = canvas.width  = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    for (let i = 0; i < DOTS; i++) {
      dots.push({
        x: Math.random() * 1400,
        y: Math.random() * 900,
        vx: (Math.random() - 0.5) * 0.35,
        vy: (Math.random() - 0.5) * 0.35,
        r: Math.random() * 1.8 + 0.4,
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      // connections
      for (let i = 0; i < dots.length; i++) {
        for (let j = i + 1; j < dots.length; j++) {
          const dx = dots[i].x - dots[j].x;
          const dy = dots[i].y - dots[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 140) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(91,140,255,${0.18 * (1 - dist / 140)})`;
            ctx.lineWidth = 0.7;
            ctx.moveTo(dots[i].x, dots[i].y);
            ctx.lineTo(dots[j].x, dots[j].y);
            ctx.stroke();
          }
        }
      }
      // dots
      dots.forEach(d => {
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(91,140,255,0.55)";
        ctx.fill();
        d.x += d.vx; d.y += d.vy;
        if (d.x < 0 || d.x > W) d.vx *= -1;
        if (d.y < 0 || d.y > H) d.vy *= -1;
      });
      raf = requestAnimationFrame(draw);
    }
    draw();
    return () => { cancelAnimationFrame(raf); window.removeEventListener("resize", resize); };
  }, []);

  function handleEnter() {
    setPhase(4);
    setTimeout(onEnter, 600);
  }

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 1000,
      background: "radial-gradient(ellipse 120% 100% at 50% 0%, #0d1533 0%, #060810 60%)",
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      overflow: "hidden",
      opacity: phase === 4 ? 0 : 1,
      transition: "opacity 0.6s ease",
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Cairo:wght@400;700;900&display=swap');
        @keyframes shimmer {
          0%   { background-position: -400px 0; }
          100% { background-position:  400px 0; }
        }
        @keyframes pulseRing {
          0%   { transform:scale(1);   opacity:0.4; }
          100% { transform:scale(1.6); opacity:0;   }
        }
        @keyframes floatUp {
          from { opacity:0; transform:translateY(22px); }
          to   { opacity:1; transform:translateY(0);    }
        }
        @keyframes fadeInBtn {
          from { opacity:0; transform:translateY(10px) scale(0.95); }
          to   { opacity:1; transform:translateY(0)    scale(1);    }
        }
        .enter-btn:hover {
          background: #4a7be8 !important;
          box-shadow: 0 0 40px rgba(91,140,255,0.5) !important;
          transform: translateY(-2px) !important;
        }
        .enter-btn:active { transform: scale(0.97) !important; }
      `}</style>

      {/* particle canvas */}
      <canvas ref={canvasRef} style={{ position:"absolute", inset:0, width:"100%", height:"100%" }} />

      {/* radial glow */}
      <div style={{
        position:"absolute", top:"35%", left:"50%", transform:"translate(-50%,-50%)",
        width:500, height:500, borderRadius:"50%",
        background:"radial-gradient(circle, rgba(91,140,255,0.12) 0%, transparent 70%)",
        pointerEvents:"none",
      }} />

      {/* pulsing ring */}
      <div style={{
        position:"absolute", top:"35%", left:"50%", transform:"translate(-50%,-50%)",
        width:220, height:220, borderRadius:"50%",
        border:"1px solid rgba(91,140,255,0.25)",
        animation:"pulseRing 2.5s ease-out infinite",
        pointerEvents:"none",
      }} />

      {/* content */}
      <div style={{ position:"relative", zIndex:2, textAlign:"center", padding:"2rem" }}>

        {/* logo mark */}
        <div style={{
          width:64, height:64, borderRadius:18,
          background:"linear-gradient(135deg,#1a2fff,#5b8cff)",
          display:"flex", alignItems:"center", justifyContent:"center",
          margin:"0 auto 1.75rem",
          boxShadow:"0 0 30px rgba(91,140,255,0.4)",
          opacity: phase >= 1 ? 1 : 0,
          transform: phase >= 1 ? "scale(1)" : "scale(0.7)",
          transition:"all 0.6s cubic-bezier(.34,1.56,.64,1)",
        }}>
          <span style={{ fontSize:"1.8rem" }}>📋</span>
        </div>

        {/* Welcome to */}
        <div style={{
          fontFamily:"'Syne',sans-serif",
          fontSize:"clamp(0.75rem, 2vw, 0.9rem)",
          letterSpacing:"0.35em",
          textTransform:"uppercase",
          color:"rgba(91,140,255,0.8)",
          marginBottom:"0.5rem",
          opacity: phase >= 1 ? 1 : 0,
          animation: phase >= 1 ? "floatUp 0.7s ease both" : "none",
        }}>
          Welcome to
        </div>

        {/* MR STUDIO */}
        <h1 style={{
          fontFamily:"'Syne',sans-serif",
          fontSize:"clamp(2.8rem, 10vw, 5.5rem)",
          fontWeight:800,
          letterSpacing:"-0.02em",
          margin:"0 0 0.5rem",
          lineHeight:1,
          backgroundImage:"linear-gradient(90deg, #e8f0ff 0%, #5b8cff 40%, #ffffff 55%, #5b8cff 70%, #e8f0ff 100%)",
          backgroundSize:"400px 100%",
          WebkitBackgroundClip:"text",
          WebkitTextFillColor:"transparent",
          animation: phase >= 1 ? "floatUp 0.7s 0.1s ease both, shimmer 3s 1.5s linear infinite" : "none",
          opacity: phase >= 1 ? 1 : 0,
        }}>
          MR STUDIO
        </h1>

        {/* tagline */}
        <p style={{
          fontFamily:"'Cairo',sans-serif",
          fontSize:"clamp(0.8rem,2vw,0.95rem)",
          color:"rgba(160,175,220,0.65)",
          margin:"0 0 3rem",
          letterSpacing:"0.05em",
          opacity: phase >= 2 ? 1 : 0,
          animation: phase >= 2 ? "floatUp 0.6s ease both" : "none",
        }}>
          نظام إدارة عملائك الفريلانس
        </p>

        {/* enter button */}
        {phase >= 3 && (
          <button className="enter-btn" onClick={handleEnter} style={{
            fontFamily:"'Cairo',sans-serif",
            fontWeight:700,
            fontSize:"0.95rem",
            color:"#fff",
            background:"#5b8cff",
            border:"none",
            borderRadius:"14px",
            padding:"0.9rem 3rem",
            cursor:"pointer",
            boxShadow:"0 4px 24px rgba(91,140,255,0.35)",
            transition:"all 0.25s ease",
            animation:"fadeInBtn 0.5s ease both",
            letterSpacing:"0.05em",
          }}>
            ادخل البرنامج →
          </button>
        )}
      </div>

      {/* bottom grid lines decoration */}
      <div style={{
        position:"absolute", bottom:0, left:0, right:0, height:"180px",
        backgroundImage:`
          linear-gradient(rgba(91,140,255,0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(91,140,255,0.06) 1px, transparent 1px)
        `,
        backgroundSize:"50px 50px",
        maskImage:"linear-gradient(to top, rgba(0,0,0,0.4) 0%, transparent 100%)",
        WebkitMaskImage:"linear-gradient(to top, rgba(0,0,0,0.4) 0%, transparent 100%)",
        pointerEvents:"none",
      }} />
    </div>
  );
}

function stObj(id)    { return STATUSES.find(s=>s.id===id) || STATUSES[0]; }
function srcLabel(id) { return SOURCES.find(s=>s.id===id)?.label || ""; }
function todayStr()   { return new Date().toISOString().split("T")[0]; }
function fmtPrice(p)  { return p ? `${Number(p).toLocaleString("ar-EG")} ج` : "—"; }
function followUpLabel(d) {
  if (!d) return null;
  const t = todayStr();
  if (d < t) return { text:"متأخر!", color:"#e05555" };
  if (d === t) return { text:"اليوم",  color:"#f5a623" };
  return { text: d.split("-").reverse().join("/"), color:"#a78bfa" };

/* CSV export */
function exportCSV(clients) {
  const headers = ["الاسم","النوع","المصدر","الهاتف","الحالة","القيمة","ملاحظة","المتابعة"];
  const rows = clients.map(c => [
    c.name, c.type, srcLabel(c.source), c.phone,
    stObj(c.status).label, c.price||"", c.note||"", c.followUp||""
  ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(","));
  const csv = "\uFEFF" + [headers.join(","), ...rows].join("\n");
  const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = "عملائي.csv"; a.click();
  URL.revokeObjectURL(url);
}

/* ─────────────────────────── REVENUE DASHBOARD ──────────────────── */
const RevenueDashboard = memo(function RevenueDashboard({ clients }) {
  const wonClients  = clients.filter(c=>c.status==="won");
  const waitClients = clients.filter(c=>c.status==="waiting"||c.status==="contacted");
  const earned    = wonClients.reduce((s,c)=>s+(Number(c.price)||0),0);
  const potential = waitClients.reduce((s,c)=>s+(Number(c.price)||0),0);
  const avg       = wonClients.length>0 ? Math.round(earned/wonClients.length) : 0;
  const srcData   = {};
  clients.filter(c=>c.status==="won"&&c.source&&c.price).forEach(c=>{
    if (!srcData[c.source]) srcData[c.source]={count:0,total:0};
    srcData[c.source].count++; srcData[c.source].total+=Number(c.price)||0;
  });
  const srcRows    = Object.entries(srcData).sort((a,b)=>b[1].total-a[1].total);
  const maxSrcTotal= srcRows.length>0 ? srcRows[0][1].total : 1;
  if (clients.length<1) return null;
  return (
    <div style={{ background:"rgba(37,211,102,0.03)", border:"1px solid rgba(37,211,102,0.12)", borderRadius:"16px", padding:"1.1rem 1.2rem", marginBottom:"1.1rem" }}>
      <div style={{ ...F, fontSize:"0.65rem", color:"#25d366", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:"0.85rem" }}>💰 لوحة الإيرادات</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"0.5rem", marginBottom:srcRows.length>0?"0.9rem":"0" }}>
        {[
          { label:"محصّل",        value:earned>0?`${earned.toLocaleString("ar-EG")} ج`:"—",    color:"#25d366" },
          { label:"متوقع",        value:potential>0?`${potential.toLocaleString("ar-EG")} ج`:"—", color:"#a78bfa" },
          { label:"متوسط الصفقة", value:avg>0?`${avg.toLocaleString("ar-EG")} ج`:"—",           color:"#f5a623" },
        ].map(item=>(
          <div key={item.label} style={{ textAlign:"center", background:"rgba(0,0,0,0.2)", borderRadius:"10px", padding:"0.65rem 0.3rem" }}>
            <div style={{ ...F, fontSize:"1rem", fontWeight:900, color:item.color, lineHeight:1 }}>{item.value}</div>
            <div style={{ ...F, fontSize:"0.58rem", color:"#555", marginTop:"4px" }}>{item.label}</div>
          </div>
        ))}
      </div>
      {srcRows.length>0 && (
        <div>
          <div style={{ ...F, fontSize:"0.62rem", color:"#444", marginBottom:"0.5rem" }}>إيرادات حسب المصدر</div>
          {srcRows.map(([src,d])=>(
            <div key={src} style={{ display:"flex", alignItems:"center", gap:"0.6rem", marginBottom:"0.35rem" }}>
              <span style={{ ...F, fontSize:"0.68rem", color:"#666", minWidth:"95px" }}>{srcLabel(src)}</span>
              <div style={{ flex:1, height:5, background:"rgba(255,255,255,0.05)", borderRadius:3, overflow:"hidden" }}>
                <div style={{ height:"100%", width:`${(d.total/maxSrcTotal)*100}%`, background:"#25d366", borderRadius:3 }} />
              </div>
              <span style={{ ...F, fontSize:"0.68rem", color:"#25d366", minWidth:"52px", textAlign:"left" }}>{d.total.toLocaleString("ar-EG")} ج</span>
            </div>
          ))}
        </div>
      )}

  );
});

/* ─────────────────────────── INSIGHTS BAR ───────────────────────── */
const InsightsBar = memo(function InsightsBar({ clients }) {
  if (clients.length<2) return null;
  const contacted = clients.filter(c=>c.status!=="new").length;
  const won       = clients.filter(c=>c.status==="won").length;
  const rate      = contacted>0 ? Math.round((won/contacted)*100) : 0;
  const srcWins   = {};
  clients.filter(c=>c.status==="won"&&c.source).forEach(c=>{ srcWins[c.source]=(srcWins[c.source]||0)+1; });
  const bestSrc   = Object.entries(srcWins).sort((a,b)=>b[1]-a[1])[0];
  return (
    <div style={{ background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:"14px", padding:"0.8rem 1rem", marginBottom:"1rem", display:"flex", gap:"1rem", flexWrap:"wrap" }}>

});

/* ─────────────────────────── SMART REMINDERS BANNER ─────────────── */
const RemindersBanner = memo(function RemindersBanner({ clients, onFilter }) {
  const today   = todayStr();
  const overdue = clients.filter(c=>c.followUp&&c.followUp<today&&c.status!=="won"&&c.status!=="lost");
  const dueToday= clients.filter(c=>c.followUp===today&&c.status!=="won"&&c.status!=="lost");
  if (overdue.length===0 && dueToday.length===0) return null;

  const isOverdue = overdue.length > 0;
  const list      = isOverdue ? overdue : dueToday;
  const color     = isOverdue ? "#e05555" : "#f5a623";
  const bg        = isOverdue ? "rgba(224,85,85,0.06)" : "rgba(245,166,35,0.06)";
  const border    = isOverdue ? "rgba(224,85,85,0.2)"  : "rgba(245,166,35,0.2)";
  const icon      = isOverdue ? "⚠️" : "🔔";
  const headline  = isOverdue
    ? `${overdue.length} عميل متأخر في المتابعة`
    : `${dueToday.length} عميل متابعتهم اليوم`;

  return (
    <div style={{ background:bg, border:`1px solid ${border}`, borderRadius:"14px", padding:"0.85rem 1rem", marginBottom:"1rem", animation:"fadeUp 0.4s ease" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"0.5rem" }}>
        <span style={{ ...F, fontSize:"0.78rem", fontWeight:700, color }}>{icon} {headline}</span>
        <button onClick={onFilter} style={{ ...F, fontSize:"0.65rem", color, background:"transparent", border:`1px solid ${color}44`, borderRadius:"8px", padding:"2px 8px", cursor:"pointer" }}>عرض الكل</button>

      <div style={{ display:"flex", gap:"0.4rem", flexWrap:"wrap" }}>
        {list.slice(0,4).map(c=>(

      </div>

  );
});

/* ─────────────────────────── MESSAGE DRAWER ─────────────────────── */

  const [msg,setMsg]       = useState("");
  const [loading,setLoad]  = useState(false);
  const [copied,setCopied] = useState(false);
  useEffect(()=>{ generate(); },[]);

  async function generate() {

/* ─────────────────────────── MAIN APP ──────────────────────────── */
function CRMApp() {
  const [clients,   setClients]  = useState(()=>{ try{const s=localStorage.getItem("crm_v5");return s?JSON.parse(s):DEMO_CLIENTS;}catch{return DEMO_CLIENTS;} });
  const [showModal, setShowModal]= useState(false);
  const [form,      setForm]     = useState(EMPTY_FORM);
  const [editingId, setEditingId]= useState(null);
  const [filter,    setFilter]   = useState("all");
  const [search,    setSearch]   = useState("");
  const [toast,     setToast]    = useState(null);
  const [msgClient, setMsgClient]= useState(null);
  const [sortBy,    setSortBy]   = useState("default");
  const [viewMode,  setViewMode] = useState("list"); // list | pipeline

  useEffect(()=>{ try{localStorage.setItem("crm_v5",JSON.stringify(clients));}catch{} },[clients]);

  /* ── stable callbacks (fix re-render) ── */
  const changeStatus = useCallback((id,status)=>{
    setClients(cs=>cs.map(c=>{
      if(c.id!==id) return c;
      const activity=[...(c.activity||[]),{date:todayStr(),text:`تغيّرت الحالة إلى: ${stObj(status).label}`}];
      return {...c,status,activity};
    }));
  },[]);

  const deleteClient = useCallback((id)=>{
    setClients(cs=>{
      const t=cs.find(c=>c.id===id); if(!t) return cs;
      const next=cs.filter(c=>c.id!==id);
      setToast({message:`تم حذف "${t.name}"`,restore:()=>setClients(p=>[...p,t].sort((a,b)=>b.id-a.id))});
      return next;
    });
  },[]);

  const openEdit = useCallback((c)=>{
    setForm({name:c.name,type:c.type,source:c.source,phone:c.phone,status:c.status,note:c.note,followUp:c.followUp||"",price:c.price||""});
    setEditingId(c.id); setShowModal(true);
  },[]);

  const openMsg = useCallback((c)=>setMsgClient(c),[]);

  function openAdd(){ setForm(EMPTY_FORM); setEditingId(null); setShowModal(true); }

  function saveClient(){
    if(!form.name.trim()) return;
    const now=todayStr();
    if(editingId){
      setClients(cs=>cs.map(c=>{
        if(c.id!==editingId) return c;
        const activity=[...(c.activity||[])];
        if(form.status!==c.status) activity.push({date:now,text:`تغيّرت الحالة إلى: ${stObj(form.status).label}`});
        if(form.price&&form.price!==c.price) activity.push({date:now,text:`تحديث قيمة الصفقة: ${fmtPrice(form.price)}`});
        return{...c,...form,activity};
      }));
    } else {
      setClients(cs=>[{...form,id:Date.now(),activity:[{date:now,text:"أُضيف كعميل جديد"}]},...cs]);
    }
    setShowModal(false);
  }

  /* ── memoised derived data ── */
  const filtered = useMemo(()=>{
    let list = clients.filter(c=>{
      const ms=filter==="all"||c.status===filter;
      const mq=!search||c.name.includes(search)||(c.note||"").includes(search);
      return ms&&mq;
    });
    if(sortBy==="followup") list=[...list].sort((a,b)=>(a.followUp||"9999")<(b.followUp||"9999")?-1:1);
    if(sortBy==="price")    list=[...list].sort((a,b)=>(Number(b.price)||0)-(Number(a.price)||0));
    return list;
  },[clients,filter,search,sortBy]);

  const stats = useMemo(()=>({
    total:     clients.length,
    new:       clients.filter(c=>c.status==="new").length,
    contacted: clients.filter(c=>c.status==="contacted"||c.status==="waiting").length,
    won:       clients.filter(c=>c.status==="won").length,
  }),[clients]);

  const today    = todayStr();
  const dueToday = useMemo(()=>clients.filter(c=>c.followUp===today).length,[clients]);

  return (
    <div dir="rtl" style={{minHeight:"100vh",background:"#0b0d12",color:"#e8e0d0",...F}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        * { box-sizing:border-box; margin:0; padding:0; }
        @keyframes slideUp  { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
        @keyframes expandIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
        @keyframes fadeUp   { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        @keyframes bounce   { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
        select option { background:#1a1d25; color:#e8e0d0; }
        input::placeholder,textarea::placeholder { color:#333; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(0.4); }
        input[type="number"]::-webkit-inner-spin-button { opacity:0.3; }
        ::-webkit-scrollbar { width:3px; }
        ::-webkit-scrollbar-thumb { background:#222; border-radius:3px; }
        .flt:hover  { border-color:rgba(255,255,255,0.2)!important; color:#bbb!important; }
        .addbtn:hover { background:#4a7be8!important; transform:translateY(-1px); }
        .icon-btn:hover { background:rgba(255,255,255,0.08)!important; }
      `}</style>

      {/* ── HEADER ── */}
      <div style={{background:"rgba(0,0,0,0.45)",borderBottom:"1px solid rgba(255,255,255,0.06)",padding:"1rem 1.4rem",backdropFilter:"blur(12px)",position:"sticky",top:0,zIndex:50,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <h1 style={{...F,fontWeight:900,fontSize:"1.1rem",color:"#f0e8d8",display:"flex",alignItems:"center",gap:"0.5rem"}}>
            📋 عملائي
            {dueToday>0&&<span style={{...F,fontSize:"0.62rem",background:"#f5a623",color:"#000",borderRadius:"10px",padding:"1px 7px",fontWeight:700}}>{dueToday} اليوم</span>}
          </h1>
          <div style={{...F,fontSize:"0.62rem",color:"#444",marginTop:"1px"}}>{clients.length} عميل محتمل</div>
        </div>
        <div style={{display:"flex",gap:"0.5rem",alignItems:"center"}}>
          {clients.length>0&&(
            <button className="icon-btn" onClick={()=>exportCSV(clients)} title="تصدير CSV"
              style={{...F,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"10px",padding:"0.5rem 0.7rem",color:"#666",fontSize:"0.8rem",cursor:"pointer",transition:"all 0.2s"}}>⬇️</button>
          )}
          <button className="addbtn" onClick={openAdd}
            style={{...F,background:"#5b8cff",border:"none",borderRadius:"12px",padding:"0.55rem 1.1rem",color:"#fff",fontWeight:700,fontSize:"0.85rem",cursor:"pointer",transition:"all 0.2s"}}>+ إضافة</button>
        </div>
      </div>

      <div style={{maxWidth:viewMode==="pipeline"?900:600,margin:"0 auto",padding:"1.3rem 1.1rem 6rem",transition:"max-width 0.3s ease"}}>
        {clients.length>0&&(
          <>
            {/* stats */}
            <div style={{display:"flex",gap:"0.5rem",marginBottom:"1rem",animation:"fadeUp 0.4s ease"}}>
              {[
                {label:"إجمالي",  value:stats.total,     color:"#f0e8d8"},
                {label:"جدد",     value:stats.new,       color:"#5b8cff"},
                {label:"تواصلت",  value:stats.contacted, color:"#f5a623"},
                {label:"اتفقنا ✓",value:stats.won,       color:"#25d366"},
              ].map(s=>(
                <div key={s.label} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"14px",padding:"0.85rem 0.4rem",textAlign:"center",flex:1}}>
                  <div style={{...F,fontSize:"1.4rem",fontWeight:900,color:s.color,lineHeight:1}}>{s.value}</div>
                  <div style={{...F,fontSize:"0.6rem",color:"#555",marginTop:"3px"}}>{s.label}</div>
                </div>
              ))}
            </div>

            <RevenueDashboard clients={clients} />
            <InsightsBar clients={clients} />
            <RemindersBanner clients={clients} onFilter={()=>{setFilter("all");setSortBy("followup");setViewMode("list");}} />

            {/* toolbar */}
            <div style={{display:"flex",gap:"0.5rem",marginBottom:"0.7rem",alignItems:"center"}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 ابحث..." style={{...IS,flex:1}} />
              {/* sort */}
              <button className="flt" onClick={()=>setSortBy(s=>s==="followup"?"default":"followup")}
                style={{...F,padding:"0 0.75rem",height:"42px",borderRadius:"10px",cursor:"pointer",fontSize:"0.7rem",fontWeight:700,
                  border:`1px solid ${sortBy==="followup"?"#a78bfa":"rgba(255,255,255,0.09)"}`,
                  background:sortBy==="followup"?"rgba(167,139,250,0.1)":"rgba(255,255,255,0.03)",
                  color:sortBy==="followup"?"#a78bfa":"#555",flexShrink:0}}>🗓️</button>
              <button className="flt" onClick={()=>setSortBy(s=>s==="price"?"default":"price")}
                style={{...F,padding:"0 0.75rem",height:"42px",borderRadius:"10px",cursor:"pointer",fontSize:"0.7rem",fontWeight:700,
                  border:`1px solid ${sortBy==="price"?"#25d366":"rgba(255,255,255,0.09)"}`,
                  background:sortBy==="price"?"rgba(37,211,102,0.1)":"rgba(255,255,255,0.03)",
                  color:sortBy==="price"?"#25d366":"#555",flexShrink:0}}>💰</button>
              {/* view toggle */}
              <div style={{display:"flex",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"10px",overflow:"hidden",flexShrink:0}}>
                {[{id:"list",icon:"☰"},{id:"pipeline",icon:"⬛"}].map(v=>(
                  <button key={v.id} onClick={()=>setViewMode(v.id)}
                    style={{...F,padding:"0 0.75rem",height:"42px",cursor:"pointer",border:"none",
                      background:viewMode===v.id?"rgba(255,255,255,0.1)":"transparent",
                      color:viewMode===v.id?"#f0e8d8":"#555",fontSize:"0.8rem",transition:"all 0.15s"}}>{v.icon}</button>
                ))}
              </div>
            </div>

            {/* filter pills — only in list mode */}
            {viewMode==="list"&&(
              <div style={{display:"flex",gap:"0.35rem",marginBottom:"1rem",overflowX:"auto",paddingBottom:"3px"}}>
                {[{id:"all",label:"الكل",color:"#f0e8d8"},...STATUSES].map(s=>(
                  <button key={s.id} className="flt" onClick={()=>setFilter(s.id)}
                    style={{...F,padding:"4px 13px",borderRadius:"20px",cursor:"pointer",whiteSpace:"nowrap",fontSize:"0.7rem",fontWeight:700,
                      border:`1px solid ${filter===s.id?s.color:"rgba(255,255,255,0.07)"}`,
                      background:filter===s.id?`${s.color}18`:"transparent",
                      color:filter===s.id?s.color:"#555",transition:"all 0.15s"}}>{s.label}</button>
                ))}
              </div>
            )}
          </>
        )}

        {/* ── CONTENT ── */}
        {clients.length===0 ? <EmptyState onAdd={openAdd} /> :
         viewMode==="pipeline" ? (
           <PipelineView clients={clients} onStatusChange={changeStatus} onEdit={openEdit} onDelete={deleteClient} onMessage={openMsg} />
         ) : filtered.length===0 ? (
           <div style={{textAlign:"center",padding:"2.5rem 1rem",color:"#333"}}>
             <div style={{fontSize:"2rem",marginBottom:"0.5rem"}}>🔍</div>
             <div style={{...F,fontWeight:700,color:"#444"}}>مفيش نتايج</div>
           </div>
         ) : (
           <div style={{display:"flex",flexDirection:"column",gap:"0.65rem"}}>
             {filtered.map(c=>(
               <ClientCard key={c.id} client={c} onStatusChange={changeStatus} onDelete={deleteClient} onEdit={openEdit} onMessage={openMsg} />
             ))}
           </div>
         )}
      </div>

      {showModal && <Modal form={form} setForm={setForm} onSave={saveClient} onClose={()=>setShowModal(false)} editing={!!editingId} />}
      {msgClient && <MessageDrawer client={msgClient} onClose={()=>setMsgClient(null)} />}
      {toast     && <UndoToast message={toast.message} onUndo={()=>{toast.restore();setToast(null);}} onDismiss={()=>setToast(null)} />}
    </div>
  );
}

function App() {
  const [entered, setEntered] = useState(false);
  return (
    <>
      {!entered && <SplashScreen onEnter={() => setEntered(true)} />}
      {entered  && <CRMApp />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

  </script>
</body>
</html>
